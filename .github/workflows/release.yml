name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish installer
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve release tag
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            "release_tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
            exit 0
          }

          [xml]$project = Get-Content ".\IntuneWinPackager.App\IntuneWinPackager.App.csproj"
          $version = $project.Project.PropertyGroup.Version |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Select-Object -First 1

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Could not resolve release version from app project."
          }

          "release_tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        shell: pwsh
        run: dotnet restore .\IntuneWinPackager.sln

      - name: Test
        shell: pwsh
        run: dotnet test .\IntuneWinPackager.sln -c Release --no-restore

      - name: Build installer
        shell: pwsh
        run: .\scripts\build-installer.ps1 -Configuration Release

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "artifacts\installer" -Filter "IntuneWinPackager-Setup-*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "No installer asset was produced."
          }

          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $shaPath = "$($installer.FullName).sha256"
          "$hash  $($installer.Name)" | Set-Content -LiteralPath $shaPath -Encoding ascii

          "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "sha_path=$shaPath" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          body: See CHANGELOG.md for details.
          draft: false
          prerelease: false
          files: |
            ${{ steps.assets.outputs.installer_path }}
            ${{ steps.assets.outputs.sha_path }}
